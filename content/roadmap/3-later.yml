features:
  - id: live-trading
    hero: true
    title: "Live Trading via Alpaca — v1.0"
    category: "Trading · Execution · Milestone"
    icon: trade
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Q1 2027"
    description: >-
      The v1.0 milestone. Users will be able to place trades directly from within Ampliterm through an Alpaca brokerage connection — without leaving the research terminal or the chart they've been studying. Every order is linked to the journal entry and strategy that justified it, creating a complete, auditable chain from thesis to execution. Strategy alerts go from notifications to actionable — when a setup triggers, you can act on it in the same screen.
    bullets:
      - "<strong>Alpaca broker integration</strong> — connect your Alpaca account via OAuth. Market, limit, and stop orders supported at launch."
      - "<strong>Order ticket from the chart</strong> — open an order ticket directly from any stock page without navigating away."
      - "<strong>Journal linkage</strong> — every trade automatically links back to the journal entry and strategy that preceded it."
      - "<strong>Strategy-triggered alerts with order flow</strong> — when a strategy setup fires, the alert includes a one-click path to the order ticket."
      - "<strong>Position tracking</strong> — open positions reflected on the chart and dashboard in real time."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Broker
        value: "Alpaca Markets"
        color: green
      - label: Milestone
        value: v1.0 GA
        color: green
      - label: Pre-reqs
        value: "Strategies · Dashboard"

  - id: algorithmic-trading
    title: "Algorithmic Trading"
    category: "Automation · Strategy"
    icon: robot
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Q2 2027"
    description: >-
      The logical extension of Strategies. Once a strategy is defined and live trading is connected, you can instruct the system to execute trades automatically when setup conditions are met — with hard limits on position size, account exposure, and maximum concurrent positions. The system trades the strategy; you review the log.
    bullets:
      - "<strong>Strategy automation rules</strong> — enable any saved strategy for automated execution with a defined position size."
      - "<strong>Risk guardrails</strong> — set a maximum number of concurrent automated positions and a maximum percentage of account value that can be in automated trades at once."
      - "<strong>Execution log</strong> — every automated trade logged with the exact signal conditions that triggered it, fully auditable."
      - "<strong>Kill switch</strong> — pause or stop all automated trading instantly from any screen."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Pre-reqs
        value: "Live trading · Strategies"
        color: amber

  - id: edgar-ibkr
    title: "EDGAR Filings + IBKR Connection"
    category: "Data · Integrations"
    icon: filing
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Q2 2027"
    description: >-
      Two data integrations that push Ampliterm deeper into institutional-grade research. SEC EDGAR pulls are indexed locally so you can search across filings for any company in your watchlist. The Interactive Brokers connection brings a second broker option for users who already trade on IBKR.
    bullets:
      - "<strong>EDGAR public filing ingestion</strong> — automatically pull and index 8-K, 10-Q, 10-K, 13-F, and S-1 filings for any watchlist symbol."
      - "<strong>Full-text search across filings</strong> — search across all indexed filings by ticker, keyword, or date range."
      - "<strong>Filing alerts</strong> — notify when a new filing drops for any watchlist symbol."
      - "<strong>Interactive Brokers (IBKR) connection</strong> — second broker integration for live trading and position sync."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Sources
