features:
  - id: ibkr
    hero: true
    title: "IBKR Connection"
    category: "Trading · Integrations"
    icon: filing
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Q1 2027"
    description: >-
      The second broker. Interactive Brokers support brings Ampliterm to users who already trade on IBKR — and proves out the promise the engine was built around: the broker layer is a swappable seam. Adding IBKR means a new broker gateway and credentials, not an engine rewrite. Same principle as Alpaca: <strong>your broker is both the data source and the execution venue</strong>, so IBKR users run on IBKR data.
    bullets:
      - "<strong>IBKR execution</strong> — deploy the same strategies against an Interactive Brokers account."
      - "<strong>IBKR market data</strong> — your IBKR data entitlements power the engine, mirroring the Alpaca model."
      - "<strong>Engine untouched</strong> — strategies, backtests, the screener, and the ledger all carry over unchanged."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Broker
        value: "Interactive Brokers"
      - label: Pre-reqs
        value: "v1.0 GA"

  - id: live-trade-watch
    title: "Live Trade Watch"
    category: "Trading · Monitoring"
    icon: trade
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Q1 2027"
    description: >-
      The real-time sibling of the strategy debugger: a per-position monitoring view showing exactly where every armed strategy and open position stands right now — which confirmations are pending, how far price sits from the stop, what the engine will do next — with manual intervention controls for when you want to step in ahead of the logic.
    bullets:
      - "<strong>Armed-setup monitor</strong> — every pending arm with its confirmation checklist and window countdowns, live."
      - "<strong>Position watch</strong> — open positions with distance-to-stop and distance-to-target as the market moves."
      - "<strong>Manual intervention</strong> — close or reduce a position from the watch view, recorded in the ledger alongside engine actions."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Pre-reqs
        value: "v1.0 · WebSocket feed"

  - id: scale-in-pyramiding
    title: "Scale-In & Pyramiding"
    category: "Strategy · Position Management"
    icon: lightning
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Q2 2027"
    description: >-
      Strategies that build positions in stages instead of all at once — add on strength, trim into targets. The engine's position model is already leg-aware under the hood; this exposes scale-up and scale-down as first-class strategy actions in the builder.
    bullets:
      - "<strong>Scale-up actions</strong> — add to a winner when a second setup confirms."
      - "<strong>Scale-down actions</strong> — take partial profits at defined levels while the rest runs."
      - "<strong>Leg-aware ledger</strong> — every add and trim recorded as its own leg with its own fill."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Pre-reqs
        value: "v1.0 GA"

  - id: whole-market-screener
    title: "Whole-Market Screening"
    category: "Screener · Scale"
    icon: globe
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Q2 2027"
    description: >-
      Today the nightly screener sweeps your watchlist and deployed tickers. This expands the universe to the entire market — thousands of symbols against your strategies every night — so the screener finds setups on names you've never looked at. Gated on a bulk end-of-day data ingestion mode; the screener itself was built with this swap in mind.
    bullets:
      - "<strong>All-tickers universe</strong> — screen every listed symbol, not just your watchlist."
      - "<strong>Per-user scope setting</strong> — choose \"screen my watchlist\" or \"screen everything\" per strategy."
      - "<strong>Bulk EOD ingestion</strong> — a daily-bar sync mode sized for thousands of symbols."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Pre-reqs
        value: "EOD data pipeline"
