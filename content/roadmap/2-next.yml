features:
  - id: websocket-live-feed
    hero: true
    title: "Real-Time WebSocket Feed & Multi-Timeframe Strategies"
    category: "Engine · Data · Real-time"
    icon: lightning
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Oct 2026"
    description: >-
      Today the live engine polls for newly closed bars every few minutes — correct, but not instant. A streaming WebSocket feed from Alpaca replaces the poll with a push: bars arrive the moment they close, aggregated to the strategy's timeframe. Built alongside it: <strong>multi-timeframe supports</strong>, so a 5-minute entry strategy can confirm against the daily trend inside one confirmation tree.
    bullets:
      - "<strong>Streaming closed bars</strong> — real-time 1-minute bars aggregated to each strategy's timeframe, emitted only on close. The no-look-ahead rule holds."
      - "<strong>Per-support timeframes</strong> — confirmations that evaluate a different candle period than the trigger (the classic \"daily trend, intraday entry\")."
      - "<strong>Engine unchanged</strong> — the feed is a seam; everything validated on the current engine carries over."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Pre-reqs
        value: "v1.0 validation"

  - id: fundamental-conditions
    title: "Fundamental & Sentiment Strategy Conditions"
    category: "Strategy · Fundamentals"
    icon: document
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Nov 2026"
    description: >-
      The strategy catalog reasons about price and volume today. This wires the EDGAR fundamentals pipeline and the AI sentiment layer into it — so a breakout strategy can require revenue growth, or a reversal setup can demand improving filing sentiment, before it fires. The condition contracts already exist in the engine; this connects the data.
    bullets:
      - "<strong>Fundamental conditions</strong> — gate entries on metrics like revenue growth or margin trend, straight from your EDGAR data."
      - "<strong>Sentiment conditions</strong> — use filing and intel sentiment as a strategy input."
      - "<strong>Screener-ready</strong> — fundamental conditions evaluate in the nightly screen like any other condition."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Pre-reqs
        value: "EDGAR fundamentals (shipped)"

  - id: super-admin-onboarding
    title: "Super Admin & Onboarding Polish"
    category: "Admin · Security"
    icon: shield
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Nov 2026"
    description: >-
      The self-hosted setup experience gets a proper first-run flow. New user registration is cleaned up end-to-end, a guided onboarding screen walks users through connecting Alpaca and building a first strategy, and two-factor authentication ships as an option for both admins and users.
    bullets:
      - "<strong>User registration cleanup</strong> — super admin can invite, approve, or restrict new accounts from a single panel."
      - "<strong>Onboarding screen</strong> — guided setup: connect Alpaca, add a ticker, build a strategy from a template, run a backtest."
      - "<strong>Two-factor authentication</strong> — TOTP (Google Authenticator, 1Password, etc.) supported for all accounts. Enforceable by super admin."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: 2FA standard
        value: TOTP (RFC 6238)

  - id: dashboard
    title: "Dashboard"
    category: "Overview · Market"
    icon: dashboard
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Dec 2026"
    description: >-
      A single screen that gives you the full picture every time you open the app. Open positions and deployment status, last night's screener hits, upcoming earnings and corporate events — all without clicking into individual pages. Built dense, like a terminal should be.
    bullets:
      - "<strong>Positions &amp; deployments overview</strong> — open positions with P&amp;L, active deployments, and kill-switch status at a glance."
      - "<strong>Screener summary</strong> — last night's triggered and alert hits, one click from the source strategy."
      - "<strong>Upcoming earnings calendar</strong> — earnings calls for any stock in your watchlist, sorted by date."
      - "<strong>Corporate actions calendar</strong> — dividends, stock splits, and other events for your holdings."
      - "<strong>Market overview</strong> — broad index performance and sector rotation at a glance."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Data
        value: "Alpaca · EDGAR"

  - id: ios-app
    title: "Ampliterm for iOS"
    category: "Mobile · Native"
    icon: mobile
    status: planned
    statusLabel: "Planned"
    etaLabel: TARGET
    eta: "Q1 2027"
    description: >-
      A full-featured native iOS app — not a mobile-responsive web wrapper. Charts, journal, strategies, screener results, the trade ledger, and the Alpha Snip capture flow, with the goal of complete parity so you can run your process from your phone when you're away from the desk.
    bullets:
      - "<strong>Alpha Snip on iOS</strong> — share any article, link, or text directly to Ampliterm from the iOS share sheet."
      - "<strong>Full chart access</strong> — your charts with every overlay and strategy marker intact."
      - "<strong>Screener &amp; trades on the go</strong> — last night's hits and your open positions, wherever you are."
      - "<strong>Push notifications</strong> — screener digests, order fills, and kill-switch alerts delivered natively."
      - "<strong>Biometric auth</strong> — Face ID / Touch ID login on top of your existing 2FA."
    meta:
