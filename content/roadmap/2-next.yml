intro: "The research terminal grows into a <strong>proactive signal system</strong>. Strategies turns your technical setups into named, reusable rules that the screener watches the whole market against — and notifies you when something's approaching your criteria. The dashboard makes the full picture visible at a glance. And iOS brings it all into your pocket."
