features:
  - id: alpha-snip
    hero: true
    title: "Alpha Snip — Browser Extension"
    category: "AI · Research · Capture"
    icon: browser
    status: dev
    statusLabel: "In dev"
    etaLabel: TARGET
    eta: "Jun 2026"
    description: >-
      Research happens in browser tabs. Alpha Snip is a Chrome/Firefox/Safari extension that lets you clip any piece of content — an article, a filing excerpt, a social post, an earnings note — and bring it directly into Ampliterm. Cortex AI processes each clip automatically: stock tickers are extracted and linked, sentiment is scored, and an <strong>alpha score (0–10)</strong> is generated to rank the signal quality of the piece. Everything lands in your Intel Feed, organized by symbol.
    bullets:
      - "<strong>One-click capture</strong> — highlight text or the whole page and send it to Ampliterm with a single click."
      - "<strong>Cortex ticker extraction</strong> — any company name or symbol mentioned in the clip is automatically identified and linked to the matching stock in your watchlist."
      - "<strong>Sentiment analysis</strong> — Cortex scores the clip bullish, neutral, or bearish at both the document and per-ticker level."
      - "<strong>Alpha score</strong> — a composite 0–10 signal quality score based on source credibility, specificity, and sentiment strength."
      - "<strong>Intel Feed</strong> — a per-symbol feed of all captured clips, sorted by recency and alpha score, visible on every stock page."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Platforms
        value: "Chrome · Firefox · Safari"
      - label: AI
        value: "Cortex via Laravel MCP"
        color: cyan

  - id: extended-technicals
    title: "Extended Technical Indicators"
    category: "Analysis · Charting"
    icon: indicators
    status: dev
    statusLabel: "In dev"
    etaLabel: TARGET
    eta: "Jun 2026"
    description: >-
      Six new technical signals join the existing EMA, SMA, and MACD suite. These indicators feed directly into the upcoming Strategies feature — every technical you add here becomes a building block for automated setup detection and screener filtering.
    bullets:
      - "<strong>Doji / Hammer</strong> — candlestick reversal pattern detection with configurable body-to-wick ratio threshold."
      - "<strong>Moving Average Touch</strong> — flags when price tags a key MA level without breaking through, a common entry trigger."
      - "<strong>Bollinger Band Touch</strong> — detects upper and lower band touches with squeeze context."
      - "<strong>RSI Overbought / Oversold</strong> — configurable thresholds with divergence detection."
      - "<strong>MACD Crossover</strong> — signal line cross events flagged on chart and available as a strategy trigger."
      - "<strong>RVOL (Relative Volume)</strong> — compares current volume to the N-day average; highlights unusual activity."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Pre-reqs
        value: "v0.13.0 charts"

  - id: super-admin-onboarding
    title: "Super Admin & Onboarding Polish"
    category: "Admin · Security"
    icon: shield
    status: planned
    statusLabel: "Planned"
