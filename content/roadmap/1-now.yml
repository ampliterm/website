intro: "Three tracks running in parallel. The <strong>Alpha Snip browser extension</strong> is the flagship — it brings Cortex AI into your research workflow so every article, filing, or tweet you read can be captured, scored, and linked to a stock. Alongside it, the technical indicator library expands significantly, and the super admin / onboarding experience gets the polish it deserves."
