  - id: live-trading-validation
    hero: true
    title: "Live Trading on Alpaca — v1.0"
    category: "Trading · Execution · Milestone"
    icon: trade
    status: beta
    statusLabel: "In validation"
    etaLabel: TARGET
    eta: "Q3 2026"
    description: >-
      The v1.0 milestone, and it's no longer a plan — it's code-complete and being validated on a real, funded Alpaca account right now. Live mode runs the <strong>identical engine and order path</strong> that paper trading has been exercising for months: the only thing that changes is where the order lands. What stands between here and GA is deliberate: a validation checklist run against real money, because an automated trading engine earns trust operationally, not in a demo.
    bullets:
      - "<strong>Same engine as paper</strong> — going live swaps the order destination and nothing else. Everything validated on Local Paper and Alpaca Paper holds."
      - "<strong>Two-key safety gate</strong> — Live must be selected as the execution mode <em>and</em> a server-level master switch enabled. Real money requires deliberately turning both."
      - "<strong>Broker-resting protective stops</strong> — a real GTC stop order rests at the broker from entry, protecting positions even between engine runs."
      - "<strong>Portfolio risk governor</strong> — max positions, notional caps, and a daily-loss kill switch enforced before any order is placed."
      - "<strong>Idempotent, audited orders</strong> — deterministic order IDs mean retries can't double-place; every placement, fill, and rejection is audit-logged."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Broker
        value: "Alpaca Markets"
        color: green
      - label: Milestone
        value: v1.0 GA
        color: green
      - label: Status
        value: "Validating on a funded account"
        color: amber

  - id: strategies-screener
    title: "Strategy Builder & EOD Screener"
    category: "Strategy · Screener · Alerts"
    icon: lightning
    status: done
    statusLabel: "Done"
    etaLabel: SHIPPED
    eta: "Jun 2026"
    description: >-
      Shipped, and deeper than originally scoped. Strategies are built as an explicit <strong>trigger → confirmation tree</strong> — ALL/AND logic with per-condition timing windows — plus invalidation guards, exit logic, risk rules, position sizing, and an optional AI confirmation gate. A 15-condition catalog covers trend, momentum, volatility, volume, and candlestick patterns. Every weekday close, the screener replays your enabled strategies across your watchlist and tiers the results.
    bullets:
      - "<strong>Strategy Builder</strong> — nested ALL/ANY confirmation trees with timing windows, bail-out guards, exits, stop/target/trailing/time risk rules, and sizing."
      - "<strong>15-condition catalog</strong> — MA and MACD crossovers, RSI, stochastic, Bollinger touch and squeeze, Donchian and ATR breakouts, VWAP cross, relative volume, volume spike, hammer, shooting star, engulfing, trend state."
      - "<strong>Nightly EOD screener</strong> — TRIGGERED / ALERT / WARNING tiers with streak tracking, expandable condition checklists, and email digests."
      - "<strong>Backtesting on the same engine</strong> — attach strategies to a simulation and inspect every trade and every trigger that didn't survive confirmation."
      - "<strong>Strategy debugger</strong> — a per-candle arm → confirm → enter timeline for any strategy over any stretch of history."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Shipped
        value: "v0.15.0 – v0.16.0"

  - id: paper-trading
    title: "Automated Paper Trading"
    category: "Trading · Execution"
    icon: robot
    status: done
    statusLabel: "Done"
    etaLabel: SHIPPED
    eta: "Jun 2026"
    description: >-
      Deploy a strategy onto a ticker and the engine trades it — evaluating closed candles every few minutes, entering and exiting positions, and writing every trade to a unified ledger. Two paper modes ship: <strong>Local Paper</strong> (instant simulated fills against a persistent, seeded paper account on your own instance) and <strong>Alpaca Paper</strong> (real orders on Alpaca's paper environment — the same order path live trading uses).
    bullets:
      - "<strong>Deployments</strong> — strategies are reusable templates; deploying one to a ticker (active / paused / retired) is what trades."
      - "<strong>Local paper account</strong> — seeded balance, cash and equity derived from actual fill history, reseedable for a clean slate."
      - "<strong>Per-strategy sizing</strong> — all-in, percent of equity, fixed notional, or fixed shares, fractional supported."
      - "<strong>Engine-written trade ledger</strong> — open positions and closed history you never type into, attributed to the deployment that produced them."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Shipped
        value: "v0.17.0"

  - id: cortex-assistant
    title: "Cortex AI Assistant"
    category: "AI · Research · Analysis"
    icon: browser
    status: done
    statusLabel: "Done"
    etaLabel: SHIPPED
    eta: "Jul 2026"
    description: >-
      The proof of concept from v0.11 is now a full conversational analyst on every page (⌘J). Cortex evaluates indicators with the engine's own math, reads your open trades, deployments, and journal for context, sees the chart you're viewing, and critiques strategy drafts while you build them. Every response is analysis — never advice, enforced by the app itself.
    bullets:
      - "<strong>Deterministic tool core</strong> — indicator evaluations computed by the same code the engine trades on; the model interprets, it doesn't invent."
      - "<strong>Your-data awareness</strong> — open trades, deployments, and journal search, scoped server-side to your account."
      - "<strong>Strategy-draft critique</strong> — reviews the unsaved strategy on your builder screen in the catalog's own vocabulary."
      - "<strong>Bring your own key</strong> — OpenAI or Anthropic, configured on your instance; you control the spend."
    meta:
      - label: Lead
        value: "@danpastori"
      - label: Shipped
        value: "v0.19.0"
